<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Question Bank — Rank Gate</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--s1:#0d1117;--s2:#161b27;--s3:#1e2535;--s4:#252d3e;
  --b1:rgba(148,163,184,.06);--b2:rgba(148,163,184,.12);--b3:rgba(148,163,184,.22);
  --blue:#3b82f6;--cyan:#06b6d4;--green:#22c55e;--red:#ef4444;
  --amber:#f59e0b;--purple:#a855f7;--indigo:#6366f1;
  --text:#e2e8f0;--t2:#94a3b8;--t3:#4b5563;
  --r:10px;--r2:14px;--r3:20px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --display:'Space Grotesk',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html[data-theme="light"]{--bg:#f7fafc;--s1:#fff;--s2:#f1f5f9;--s3:#eaf0f7;--s4:#e2e8f0;--b1:rgba(15,23,42,.08);--b2:rgba(15,23,42,.14);--b3:rgba(15,23,42,.24);--text:#0f172a;--t2:#475569;--t3:#64748b;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}

.bk-shell{display:flex;flex-direction:column;height:100vh}
.bk-topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;position:sticky;top:0;z-index:80}
.bk-topbar-left{display:flex;align-items:center;gap:10px}
.bk-brand{font-family:var(--display);font-weight:800;font-size:.95rem;color:var(--text)}
.bk-breadcrumb{font-size:.8rem;color:var(--t3)}
.bk-topbar-right{display:flex;align-items:center;gap:10px}
.bk-body{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.bk-sidebar{width:210px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.bk-sb-logo{padding:16px 16px 10px;border-bottom:1px solid var(--b1)}
.bk-sb-title{font-family:var(--display);font-weight:800;font-size:.88rem;color:var(--text)}
.bk-sb-sub{font-size:10px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.bk-nav{flex:1;padding:10px 8px}
.bk-nav-sec{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1.4px;text-transform:uppercase;padding:10px 8px 5px}
.bk-nav-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:12px;font-weight:500;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;transition:all .15s}
.bk-nav-btn:hover{background:var(--b1);color:var(--text)}
.bk-nav-btn.bk-active{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.bk-nav-ico{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.bk-nav-badge{margin-left:auto;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(59,130,246,.2);color:var(--blue)}
.bk-nav-badge.w{background:rgba(245,158,11,.2);color:var(--amber)}
.bk-nav-badge.g{background:rgba(34,197,94,.2);color:var(--green)}
.bk-sb-foot{padding:12px 14px;border-top:1px solid var(--b1);font-size:11px;color:var(--t3)}

/* Main */
.bk-main{flex:1;overflow-y:auto}
.bk-main-inner{padding:22px 24px;max-width:1400px}
.bk-section{display:none}.bk-section.bk-shown{display:block}
.bk-sec-title{font-family:var(--display);font-weight:800;font-size:1.15rem;color:var(--text);margin-bottom:4px}
.bk-sec-sub{font-size:12px;color:var(--t2);margin-bottom:18px;line-height:1.5}

/* Stats */
.bk-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.bk-stat{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;text-align:center}
.bk-stat-n{font-family:var(--display);font-weight:800;font-size:1.35rem;line-height:1;margin-bottom:4px}
.bk-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}

/* Card */
.bk-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.bk-card-title{font-family:var(--display);font-weight:700;font-size:.82rem;color:var(--text);margin-bottom:10px}
.bk-card-sub{font-size:11px;color:var(--t3);line-height:1.5}

/* Table */
.bk-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--b1);margin-bottom:12px}
.bk-tbl{width:100%;border-collapse:collapse;font-size:12px}
.bk-tbl th{background:var(--s3);color:var(--t2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
.bk-tbl td{padding:9px 12px;border-bottom:1px solid var(--b1);vertical-align:middle}
.bk-tbl tr:last-child td{border-bottom:none}
.bk-tbl tr:hover td{background:rgba(255,255,255,.012)}
.bk-qstem{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Badges */
.bk-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.bk-bl{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.22)}
.bk-cy{background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.bk-gr{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.22)}
.bk-am{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.bk-rd{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bk-pu{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.2)}

/* Buttons */
.bk-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t2);font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.bk-btn:hover{border-color:var(--b3);color:var(--text)}
.bk-btn:disabled{opacity:.4;cursor:not-allowed}
.bk-btn-p{background:linear-gradient(135deg,var(--blue),var(--cyan));border-color:transparent;color:#fff;font-weight:600}
.bk-btn-p:hover{opacity:.9}
.bk-btn-g{border-color:rgba(34,197,94,.3);color:var(--green)}.bk-btn-g:hover{background:rgba(34,197,94,.07)}
.bk-btn-r{border-color:rgba(239,68,68,.3);color:var(--red)}.bk-btn-r:hover{background:rgba(239,68,68,.07)}
.bk-btn-row{display:flex;gap:5px;flex-wrap:wrap}

/* Form */
.bk-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;display:block}
.bk-inp{width:100%;padding:8px 11px;background:var(--s3);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s}
.bk-inp:focus{border-color:var(--blue)}
.bk-inp-g{margin-bottom:12px}

/* Settings */
.bk-set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--b1)}
.bk-set-row:last-child{border-bottom:none}
.bk-set-lbl{font-size:13px;font-weight:600;color:var(--text)}
.bk-set-desc{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4;max-width:460px}
.bk-toggle{position:relative;width:36px;height:19px;cursor:pointer;flex-shrink:0}
.bk-toggle input{opacity:0;width:0;height:0;position:absolute}
.bk-tgl-track{position:absolute;inset:0;background:var(--s3);border-radius:9px;border:1px solid var(--b2);transition:all .2s}
.bk-toggle input:checked+.bk-tgl-track{background:var(--blue);border-color:var(--blue)}
.bk-tgl-thumb{position:absolute;top:2px;left:2px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.bk-toggle input:checked~.bk-tgl-thumb{transform:translateX(17px)}
input[type=range].bk-range{-webkit-appearance:none;width:120px;height:4px;background:var(--s3);border-radius:2px;outline:none}
input[type=range].bk-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid var(--bg)}
.bk-range-val{font-family:var(--mono);font-size:12px;color:var(--blue);min-width:38px;text-align:right;font-weight:700}

/* Pipeline */
.bk-pipeline{display:flex;gap:0;margin:12px 0}
.bk-pipe-step{flex:1;padding:9px 6px;background:var(--s3);border:1px solid var(--b1);text-align:center;font-size:10px;color:var(--t2);position:relative}
.bk-pipe-step:first-child{border-radius:var(--r) 0 0 var(--r)}
.bk-pipe-step:last-child{border-radius:0 var(--r) var(--r) 0}
.bk-pipe-step:not(:last-child)::after{content:'→';position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:var(--t3);z-index:1;font-size:11px}
.bk-pipe-step.bk-done{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.2);color:var(--green)}
.bk-pipe-step.bk-cur{background:rgba(59,130,246,.09);border-color:rgba(59,130,246,.25);color:var(--blue)}
.bk-pipe-ico{font-size:14px;display:block;margin-bottom:3px}
.bk-pipe-lbl{font-weight:700;font-size:10px}
.bk-pipe-sub{font-size:9px;opacity:.75;margin-top:1px}

/* QC rows */
.bk-qc-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:var(--s3);border-radius:var(--r);margin-bottom:4px}
.bk-qc-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.bk-qc-lbl{font-size:12px;color:var(--text);font-weight:500;flex:1;line-height:1.4}
.bk-qc-desc{font-size:10px;color:var(--t3);margin-top:2px}
.bk-qc-res{font-size:11px;font-weight:700;flex-shrink:0}
.bk-qc-pass{color:var(--green)}.bk-qc-fail{color:var(--red)}

/* Progress */
.bk-prog{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:6px}
.bk-prog-fill{height:100%;border-radius:3px;transition:width .25s}

/* Coverage */
.bk-cov-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--b1)}
.bk-cov-row:last-child{border-bottom:none}

/* Option boxes */
.bk-opt{padding:7px 10px;border-radius:var(--r);border:1px solid var(--b1);font-size:12px;color:var(--t2);margin-bottom:5px}
.bk-opt.bk-correct{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.07);color:var(--green)}
.bk-expl{padding:10px;background:var(--s3);border-radius:var(--r);font-size:12px;color:var(--t2);line-height:1.55;border-left:3px solid var(--blue)}

/* Code */
.bk-code{font-family:var(--mono);font-size:11px;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:12px;color:var(--cyan);overflow-x:auto;line-height:1.7;white-space:pre}

/* Pagination */
.bk-pag{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--t2)}

/* Modal */
.bk-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.bk-modal-bg.bk-open{display:flex}
.bk-modal{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r3);max-width:700px;width:100%;max-height:88vh;overflow-y:auto;padding:22px;position:relative}
.bk-modal-title{font-family:var(--display);font-weight:800;font-size:1rem;margin-bottom:14px;color:var(--text)}
.bk-modal-close{position:absolute;top:12px;right:14px;background:transparent;border:none;color:var(--t2);font-size:17px;cursor:pointer;padding:4px 8px;border-radius:var(--r)}
.bk-modal-close:hover{background:var(--b1);color:var(--text)}

/* Filter */
.bk-filter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.bk-filter select,.bk-filter input[type=text]{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 10px;outline:none;transition:border-color .2s}
.bk-filter select:focus,.bk-filter input:focus{border-color:var(--blue)}

/* Add tabs */
.bk-add-tab{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t2);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;margin-right:6px}
.bk-add-tab.bk-add-active{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--blue)}

/* Misc */
.spin{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:12px 16px;font-size:13px;color:var(--text);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:#f87171}
code{font-family:var(--mono);font-size:11px;background:var(--s3);padding:1px 5px;border-radius:3px;color:var(--cyan)}
@media(max-width:700px){.bk-sidebar{display:none}.bk-stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="bk-shell">
  <!-- Topbar -->
  <div class="bk-topbar">
    <div class="bk-topbar-left">
      <button class="bk-btn" onclick="goAdmin()">← Admin</button>
      <span class="bk-brand">Rank Gate</span>
      <span class="bk-breadcrumb">/ Question Bank</span>
    </div>
    <div class="bk-topbar-right">
      <span style="font-size:12px;color:var(--t2)">Approved: <b id="bk-hdr-approved" style="color:var(--green)">0</b></span>
      <span style="font-size:12px;color:var(--t2)">Serve: <b id="bk-hdr-pct" style="color:var(--cyan)">—%</b></span>
      <button class="bk-btn bk-btn-p" onclick="bkNav('add')">+ Add Question</button>
    </div>
  </div>

  <div class="bk-body">
    <!-- Sidebar -->
    <nav class="bk-sidebar">
      <div class="bk-sb-logo">
        <div class="bk-sb-title">Question Bank</div>
        <div class="bk-sb-sub">🗃️ Manager</div>
      </div>
      <div class="bk-nav">
        <div class="bk-nav-sec">Overview</div>
        <button class="bk-nav-btn bk-active" id="bk-nb-dashboard" onclick="bkNav('dashboard')"><span class="bk-nav-ico">📊</span>Dashboard<span class="bk-nav-badge g" id="bk-badge-total">0</span></button>
        <button class="bk-nav-btn" id="bk-nb-pipeline" onclick="bkNav('pipeline')"><span class="bk-nav-ico">⚙️</span>QC Pipeline<span class="bk-nav-badge w" id="bk-badge-pending">0</span></button>
        <div class="bk-nav-sec">Manage</div>
        <button class="bk-nav-btn" id="bk-nb-browse" onclick="bkNav('browse')"><span class="bk-nav-ico">🗃️</span>Browse Bank</button>
        <button class="bk-nav-btn" id="bk-nb-add" onclick="bkNav('add')"><span class="bk-nav-ico">➕</span>Add / Import</button>
        <button class="bk-nav-btn" id="bk-nb-review" onclick="bkNav('review')"><span class="bk-nav-ico">✋</span>Review Queue<span class="bk-nav-badge w" id="bk-badge-review">0</span></button>
        <div class="bk-nav-sec">Distribution</div>
        <button class="bk-nav-btn" id="bk-nb-settings" onclick="bkNav('settings')"><span class="bk-nav-ico">🎛️</span>Bank Settings</button>
        <button class="bk-nav-btn" id="bk-nb-coverage" onclick="bkNav('coverage')"><span class="bk-nav-ico">🗺️</span>Coverage Map</button>
        <button class="bk-nav-btn" id="bk-nb-antirepeat" onclick="bkNav('antirepeat')"><span class="bk-nav-ico">🔁</span>Anti-Repeat</button>
        <div class="bk-nav-sec">Analytics</div>
        <button class="bk-nav-btn" id="bk-nb-analytics" onclick="bkNav('analytics')"><span class="bk-nav-ico">📈</span>Performance</button>
      </div>
      <div class="bk-sb-foot"><div style="color:var(--t2);font-weight:600">Question Bank v2</div><div style="margin-top:3px">Rank Gate 2026</div></div>
    </nav>

    <!-- Main -->
    <div class="bk-main">
      <div class="bk-main-inner" id="bk-main-inner">
        <div style="text-align:center;padding:32px">
          <div class="spin" style="margin:0 auto 12px"></div>
          <div style="color:var(--t2);font-size:13px">Loading question bank…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Inspect Modal -->
<div class="bk-modal-bg" id="bk-modal-inspect">
  <div class="bk-modal">
    <button class="bk-modal-close" onclick="bkCloseInspect()">✕</button>
    <div id="bk-inspect-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
<script>
// ── bank.html bootstrap ──
let USER=null, PROFILE=null, APP_SETTINGS={}, DB_SESSIONS=[], sb=null;

function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function _restoreState(){
  try{const raw=localStorage.getItem('rg_session_state');if(!raw)return false;const state=JSON.parse(raw);USER=state.user||null;PROFILE=state.profile||null;APP_SETTINGS=state.settings||{};return !!(USER&&PROFILE&&PROFILE.role==='admin');}catch(_e){return false;}
}

async function initBank(){
  _restoreState();
  try{const raw=localStorage.getItem('app_settings');const s=raw?JSON.parse(raw):{};const url=s?.supabase?.url||'';const key=s?.supabase?.anon_key||'';if(url&&key)sb=supabase.createClient(url,key);}catch(_e){}
  if(sb){try{const{data:{session}}=await sb.auth.getSession();if(session?.user){USER=session.user;const{data:p}=await sb.from('profiles').select('*').eq('id',USER.id).single();if(p)PROFILE=p;}}catch(_e){}}
  if(!USER||!PROFILE||PROFILE.role!=='admin'){
    document.getElementById('bk-main-inner').innerHTML=`<div class="bk-card"><div class="bk-card-title" style="color:var(--red)">Access Denied</div><div class="bk-card-sub">Admin role required. <button class="bk-btn" onclick="goHome()" style="margin-top:10px">← Go to Login</button></div></div>`;
    return;
  }
  try{const th=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',th);}catch(_e){}
  await bkLoadData();
  bkNav('dashboard');
}

// ── State ──
const BK={bank:[],filtered:[],page:0,pageSize:25,loaded:false,settings:{globalPct:40,minBank:30,maxReuse:10,noRepeat:true,shuffle:true,preferHard:true,autoRetire:true,examOverrides:{}}};
const BK_EXAMS=['BITSAT','JEE_MAIN','JEE_ADV','NEET','CUET','IISER_IAT','NEST','ISI','SAT','ACT','IELTS','TOEFL','GRE','GMAT','CAT','IPMAT','JIPMAT','GATE_2027'];
const BK_SUBS={BITSAT:['Physics','Chemistry','Math','English','LR'],JEE_MAIN:['Physics','Chemistry','Math'],JEE_ADV:['Physics','Chemistry','Math'],NEET:['Physics','Chemistry','Biology'],CUET:['Physics','Chemistry','Math','Biology','English','General'],IISER_IAT:['Physics','Chemistry','Math','Biology'],GATE_2027:['GATE_GA','GATE_MATH','GATE_CORE'],SAT:['SAT_RW','SAT_MATH'],ACT:['ACT_ENG','ACT_MATH','ACT_READ','ACT_SCI'],IELTS:['IELTS_LISTEN','IELTS_READ'],TOEFL:['TOEFL_READ','TOEFL_LISTEN'],GRE:['GRE_VERB','GRE_QUANT'],GMAT:['GMAT_VERB','GMAT_QUANT','GMAT_DI'],CAT:['CAT_VARC','CAT_DILR','CAT_QA'],IPMAT:['APT_QA','APT_DILR','APT_VAR'],JIPMAT:['APT_QA','APT_DILR','APT_VAR']};
const BK_QC=[
  {ico:'📝',lbl:'Stem ≥ 20 chars',desc:'Prevents placeholder stems.',fn:q=>String(q.question||'').trim().length>=20},
  {ico:'🔢',lbl:'4 distinct options',desc:'All 4 non-empty and unique.',fn:q=>Array.isArray(q.options)&&q.options.length===4&&new Set(q.options.map(o=>String(o||'').toLowerCase().trim())).size===4},
  {ico:'🎯',lbl:'Correct key 0–3',desc:'correct must be 0,1,2 or 3.',fn:q=>{const c=Number(q.correct);return Number.isInteger(c)&&c>=0&&c<=3;}},
  {ico:'💡',lbl:'Explanation ≥ 30 chars',desc:'Thin explanations cannot justify.',fn:q=>String(q.explanation||'').trim().length>=30},
  {ico:'🚫',lbl:'No wrong-option praise',desc:'Explanation must not call a wrong option correct.',fn:q=>!/\b(option\s*)?[ABCD]\b\s*(is|:)\s*(correct|right)\b/i.test(String(q.explanation||'').replace(/the correct/gi,''))},
  {ico:'✅',lbl:'Key matches explanation',desc:'Inferred answer agrees with key.',fn:q=>{try{const inf=inferCorrectFromExplanation(String(q.explanation||''));return inf===null||inf===Number(q.correct);}catch(_e){return true;}}},
  {ico:'🏷️',lbl:'Exam + Subject + Chapter',desc:'All three metadata fields non-empty.',fn:q=>!!(q.exam&&q.subject&&q.topic)},
  {ico:'🌍',lbl:'English variant',desc:'Indian exams → British, international → American.',fn:()=>true},
];
function bkRunQC(q){return BK_QC.map(c=>{let pass=false;try{pass=!!c.fn(q);}catch(_e){}return{...c,pass};});}

// ── Load data ──
async function bkLoadData(){
  BK.bank=[];
  try{const local=JSON.parse(localStorage.getItem('question_bank_local')||'[]');if(Array.isArray(local))BK.bank.push(...local.map(q=>({...q,_src:'local',status:q.status||'approved',uses:q.use_count||0,correctRate:q.use_count&&q.correct_count?Math.round(q.correct_count/q.use_count*100):0,avgTime:0})));}catch(_e){}
  if(sb){
    try{const{data,error}=await sb.from('question_bank').select('*').order('created_at',{ascending:false}).limit(2000);if(!error&&data){const ids=new Set(data.map(r=>String(r.id||'')));BK.bank=BK.bank.filter(q=>!ids.has(String(q.id||'')));data.forEach(r=>BK.bank.push({...r,_src:'remote',status:r.status||'approved',uses:r.use_count||0,correctRate:r.use_count&&r.correct_count?Math.round(r.correct_count/r.use_count*100):0,avgTime:0,options:Array.isArray(r.options)?r.options:[]}));}}catch(_e){}
    try{const{count}=await sb.from('question_review_queue').select('id',{count:'exact',head:true}).eq('status','pending');const b=document.getElementById('bk-badge-review');if(b)b.textContent=count||0;}catch(_e){}
  }
  BK.filtered=[...BK.bank];BK.loaded=true;bkSyncStats();bkPopDrops();
}

function bkSyncStats(){
  const app=BK.bank.filter(q=>q.status==='approved').length;
  const pnd=BK.bank.filter(q=>q.status==='pending').length;
  const fld=BK.bank.filter(q=>q.status==='failed').length;
  const exs=new Set(BK.bank.map(q=>q.exam).filter(Boolean)).size;
  const S=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  S('bk-st-total',BK.bank.length);S('bk-st-approved',app);S('bk-st-pending',pnd);S('bk-st-failed',fld);S('bk-st-exams',exs);
  S('bk-badge-total',BK.bank.length);S('bk-badge-pending',pnd+fld);
  S('bk-hdr-approved',app);S('bk-hdr-pct',BK.settings.globalPct+'%');
}

function bkPopDrops(){
  const exams=[...new Set(BK.bank.map(q=>q.exam).filter(Boolean))].sort();
  const subs=[...new Set(BK.bank.map(q=>q.subject).filter(Boolean))].sort();
  ['bk-f-exam','bk-cov-exam','bk-an-exam'].forEach(id=>{const el=document.getElementById(id);if(!el)return;const cur=el.value;el.innerHTML='<option value="">All Exams</option>';exams.forEach(e=>el.appendChild(new Option(e,e)));el.value=cur;});
  const fs=document.getElementById('bk-f-subject');if(fs){fs.innerHTML='<option value="">All Subjects</option>';subs.forEach(s=>fs.appendChild(new Option(s,s)));}
  const mex=document.getElementById('bk-m-exam');if(mex&&mex.options.length<=1)BK_EXAMS.forEach(e=>mex.appendChild(new Option(e,e)));
}

  const inner=document.getElementById('bk-main-inner');
  if(!inner)return;
  inner.innerHTML=BK_RENDER[sec]?BK_RENDER[sec]():'<div class="bk-card">Section not found.</div>';

  if(sec==='browse'){bkFilterApply();}

}

ton></div>`;

// ── Batch QC ──
async function bkBatchQC(){
  const prog=document.getElementById('bk-qc-progress');const fill=document.getElementById('bk-qc-fill');const txt=document.getElementById('bk-qc-txt');const res=document.getElementById('bk-qc-results');
  if(prog)prog.style.display='block';let pass=0,fail=0;
  for(let i=0;i<BK.bank.length;i++){const q=BK.bank[i];const anyFail=bkRunQC(q).some(c=>!c.pass);if(anyFail){fail++;q.status='failed';}else{pass++;if(q.status==='failed')q.status='approved';}const pct=Math.round((i+1)/BK.bank.length*100);if(fill)fill.style.width=pct+'%';if(txt)txt.textContent=`${i+1}/${BK.bank.length} — ✓${pass} ✗${fail}`;if(i%30===0)await new Promise(r=>setTimeout(r,0));}
  if(prog)prog.style.display='none';if(res)res.innerHTML=`<div style="display:flex;gap:8px"><div class="bk-stat" style="flex:1"><div class="bk-stat-n" style="color:var(--green)">${pass}</div><div class="bk-stat-l">Passed</div></div><div class="bk-stat" style="flex:1"><div class="bk-stat-n" style="color:var(--red)">${fail}</div><div class="bk-stat-l">Failed</div></div></div>`;
  bkSyncStats();showToast(`QC done: ${pass} passed, ${fail} failed`,'success');
}
function bkExportFailed(){const failed=BK.bank.filter(q=>q.status==='failed');const rows=[['id','exam','subject','topic','question','correct','status'].join(','),...failed.map(q=>[q.id,q.exam,q.subject,q.topic,`"${(q.question||'').replace(/"/g,'""')}"`,q.correct,q.status].join(','))].join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows);a.download='qc_failed.csv';a.click();showToast('Exported '+failed.length,'success');}

function bkSyncSubs(){const ex=document.getElementById('bk-m-exam')?.value||'';const sub=document.getElementById('bk-m-subject');if(!sub)return;sub.innerHTML='<option value="">Select subject…</option>';(BK_SUBS[ex]||[]).forEach(s=>sub.appendChild(new Option(s,s)));}

function bkSaveQ(q){const ex=BK.bank.findIndex(x=>String(x.id)===String(q.id));if(ex>=0)BK.bank[ex]=q;else BK.bank.push(q);try{const local=JSON.parse(localStorage.getItem('question_bank_local')||'[]');const li=local.findIndex(x=>String(x?.id)===String(q.id));if(li>=0)local[li]=q;else local.push(q);localStorage.setItem('question_bank_local',JSON.stringify(local.slice(-2000)));}catch(_e){}if(sb)sb.from('question_bank').upsert({id:q.id,subject:q.subject,topic:q.topic,exam:q.exam,difficulty:q.difficulty,question:q.question,options:q.options,correct:q.correct,explanation:q.explanation,status:q.status,created_by:USER?.id||null}).catch(()=>{});}

function bkFP(q){try{const sub=String(q?.subject||'').trim();const top=String(q?.topic||'').trim();const stem=String(q?.question||'').trim();const opts=(q?.options||[]).map(x=>String(x||'').trim()).join('|');let h=5381>>>0;const x=`${sub}||${top}||${stem}||${opts}`;for(let i=0;i<x.length;i++)h=((h<<5)+h+x.charCodeAt(i))>>>0;return String(h>>>0);}catch(_e){return String(Date.now());}}

function bkSubmitManual(){
  const G=id=>document.getElementById(id)?.value?.trim()||'';
  const exam=G('bk-m-exam'),subject=G('bk-m-subject'),chapter=G('bk-m-chapter'),diff=G('bk-m-diff')||'medium';
  const stem=G('bk-m-stem'),a=G('bk-m-a'),b=G('bk-m-b'),c=G('bk-m-c'),d=G('bk-m-d');
  const correct=Number(G('bk-m-correct')||0),expl=G('bk-m-expl');
  if(!exam||!subject||!chapter||!stem||!a||!b||!c||!d||!expl){showToast('Fill all required fields','error');return;}
  const q={id:bkFP({subject,topic:chapter,question:stem,options:[a,b,c,d]}),exam,subject,topic:chapter,difficulty:diff,question:stem,options:[a,b,c,d],correct,explanation:expl,status:'pending',uses:0,correctRate:0,avgTime:0};
  const checks=bkRunQC(q);const anyFail=checks.some(ch=>!ch.pass);q.status=anyFail?'pending':'approved';
  bkSaveQ(q);
  const res=document.getElementById('bk-m-qc-result');if(res)res.innerHTML=`<div style="font-size:12px;font-weight:700;color:${anyFail?'var(--amber)':'var(--green)'};margin-bottom:8px">${anyFail?'⚠ Added to Review Queue':'✓ Approved & Added to Bank'}</div>`+checks.map(ch=>`<div class="bk-qc-row" style="margin-bottom:3px"><span class="bk-qc-ico">${ch.ico}</span><span class="bk-qc-lbl" style="flex:1;font-size:11px">${ch.lbl}</span><span class="bk-qc-res ${ch.pass?'bk-qc-pass':'bk-qc-fail'}" style="font-size:11px">${ch.pass?'✓':'✗'}</span></div>`).join('');
  const st=document.getElementById('bk-m-status');if(st)st.textContent=anyFail?'⚠ Needs Review':'✓ In Bank';
  bkSyncStats();showToast(anyFail?'Added to review queue':'Added to bank ✓','success');
}
function bkClearManual(){['bk-m-exam','bk-m-subject','bk-m-chapter','bk-m-stem','bk-m-a','bk-m-b','bk-m-c','bk-m-d','bk-m-expl'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});['bk-m-status','bk-m-qc-result'].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML='';});}

function bkImportJSON(){let arr;try{arr=JSON.parse(document.getElementById('bk-json-in')?.value||'[]');}catch(e){showToast('Invalid JSON','error');return;}if(!Array.isArray(arr)){showToast('Expected a JSON array','error');return;}let ok=0,fail=0;arr.forEach(raw=>{const q={...raw,id:bkFP({subject:raw.subject,topic:raw.topic,question:raw.question,options:raw.options||[]}),status:'pending',uses:0,correctRate:0};q.correct=Number(q.correct||0);const checks=bkRunQC(q);q.status=checks.every(c=>c.pass)?'approved':'pending';bkSaveQ(q);checks.every(c=>c.pass)?ok++:fail++;});const res=document.getElementById('bk-json-results');if(res)res.innerHTML=`<div style="display:flex;gap:8px"><div class="bk-stat" style="flex:1"><div class="bk-stat-n" style="color:var(--green)">${ok}</div><div class="bk-stat-l">Approved</div></div><div class="bk-stat" style="flex:1"><div class="bk-stat-n" style="color:var(--amber)">${fail}</div><div class="bk-stat-l">Review Queue</div></div></div>`;bkSyncStats();showToast(`Imported ${arr.length}: ${ok} approved, ${fail} need review`,'success');}
function bkDownloadCSV(){const h='exam,subject,topic,question,option_a,option_b,option_c,option_d,correct,explanation,difficulty';const s='BITSAT,Physics,Kinematics,"A 2 kg block...","16 ms⁻¹","22 ms⁻¹","12 ms⁻¹","30 ms⁻¹",1,"Net force calculation...",medium';const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([h,s].join('\n'));a.download='question_bank_template.csv';a.click();showToast('Template downloaded','success');}
function bkUploadCSV(input){const file=input.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const lines=e.target.result.split('\n').filter(Boolean);const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());let ok=0,fail=0;lines.slice(1).forEach(line=>{const vals=line.match(/(".*?"|[^,]+)/g)||[];const row={};headers.forEach((h,i)=>{row[h]=(vals[i]||'').replace(/^"|"$/g,'').trim();});const q={id:bkFP({subject:row.subject,topic:row.topic,question:row.question,options:[row.option_a,row.option_b,row.option_c,row.option_d]}),exam:row.exam,subject:row.subject,topic:row.topic,question:row.question,options:[row.option_a,row.option_b,row.option_c,row.option_d],correct:Number(row.correct||0),explanation:row.explanation,difficulty:row.difficulty||'medium',status:'pending',uses:0,correctRate:0};const checks=bkRunQC(q);q.status=checks.every(c=>c.pass)?'approved':'pending';bkSaveQ(q);checks.every(c=>c.pass)?ok++:fail++;});const res=document.getElementById('bk-csv-results');if(res)res.innerHTML=`<p style="font-size:12px;color:var(--t2);margin-top:10px">Imported: <b style="color:var(--green)">${ok} approved</b>, <b style="color:var(--amber)">${fail} needs review</b></p>`;bkSyncStats();showToast(`CSV: ${ok} approved, ${fail} review`,'success');};reader.readAsText(file);}

// ── Settings ──
function bkRangeVal(inp,val,suf){const v=Number(document.getElementById(inp)?.value||0);const el=document.getElementById(val);if(el)el.textContent=v+suf;bkGenCode();}
function bkOvLabel(ex){const v=Number(document.getElementById('bk-ov-'+ex)?.value??-1);const el=document.getElementById('bk-ovl-'+ex);if(el)el.textContent=v===-1?'Global':v+'%';bkGenCode();}
function bkGenCode(){const gp=Number(document.getElementById('bk-s-global')?.value??40);const mb=Number(document.getElementById('bk-s-min')?.value??30);const mr=Number(document.getElementById('bk-s-reuse')?.value??10);const nr=document.getElementById('bk-s-norepeat')?.checked??true;const sh=document.getElementById('bk-s-shuffle')?.checked??true;const ph=document.getElementById('bk-s-prefhard')?.checked??true;const ar=document.getElementById('bk-s-autoretire')?.checked??true;const ov={};BK_EXAMS.forEach(ex=>{const v=Number(document.getElementById('bk-ov-'+ex)?.value??-1);if(v>=0)ov[ex]=v;});const el=document.getElementById('bk-settings-code');if(el)el.textContent=`"bank": {\n  "global_pct": ${gp},\n  "min_bank_size": ${mb},\n  "max_reuse": ${mr},\n  "no_repeat_per_student": ${nr},\n  "shuffle_options": ${sh},\n  "prefer_bank_for_hard": ${ph},\n  "auto_flag_low_accuracy": ${ar},\n  "accuracy_flag_threshold": 0.40,\n  "accuracy_flag_min_uses": 20,\n  "exam_overrides": ${JSON.stringify(ov,null,2)}\n}`;}
function bkSaveSettings(){BK.settings.globalPct=Number(document.getElementById('bk-s-global')?.value??40);BK.settings.minBank=Number(document.getElementById('bk-s-min')?.value??30);BK.settings.maxReuse=Number(document.getElementById('bk-s-reuse')?.value??10);BK.settings.noRepeat=document.getElementById('bk-s-norepeat')?.checked??true;BK.settings.shuffle=document.getElementById('bk-s-shuffle')?.checked??true;BK.settings.preferHard=document.getElementById('bk-s-prefhard')?.checked??true;BK.settings.autoRetire=document.getElementById('bk-s-autoretire')?.checked??true;try{const s=JSON.parse(localStorage.getItem('app_settings')||'{}');if(!s.bank)s.bank={};Object.assign(s.bank,{global_pct:BK.settings.globalPct,min_bank_size:BK.settings.minBank,max_reuse:BK.settings.maxReuse});localStorage.setItem('app_settings',JSON.stringify(s));}catch(_e){}bkSyncStats();showToast('Settings saved ✓','success');}
function bkResetSettings(){BK.settings={globalPct:40,minBank:30,maxReuse:10,noRepeat:true,shuffle:true,preferHard:true,autoRetire:true,examOverrides:{}};bkNav('settings');showToast('Settings reset','success');}

// ── Navigation helpers ──
function goAdmin(){localStorage.setItem('rg_session_state',JSON.stringify({user:USER,profile:PROFILE,settings:APP_SETTINGS}));window.open('admin.html','_self');}
function goHome(){window.open('index.html','_self');}

initBank();
</script>
